name: Update TrailHub

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC; may run a few min late)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trailhub-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull photos from SPYPOINT
        env:
          SPYPOINT_USERNAME: ${{ secrets.SPYPOINT_USERNAME }}
          SPYPOINT_PASSWORD: ${{ secrets.SPYPOINT_PASSWORD }}
        run: python pull.py --limit 100

      - name: Commit and push any new photos
        run: |
          git config user.name "trailhub-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js store.json photos
          if git diff --staged --quiet; then
            echo "No new photos this run."
          else
            git commit -m "Update trail-cam photos ($(date -u +'%Y-%m-%dT%H:%MZ'))"
            for attempt in 1 2 3; do
              echo "Push attempt ${attempt}"
              git fetch origin main
              if ! git rebase origin/main; then
                echo "Rebase conflict while syncing with origin/main."
                git rebase --abort || true
                exit 1
              fi
              if git push origin HEAD:main; then
                echo "Push successful."
                break
              fi
              if [ "${attempt}" -eq 3 ]; then
                echo "Push failed after 3 attempts."
                exit 1
              fi
            done
          fi
