name: Update TrailHub

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC; may run a few min late)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trailhub-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install tesseract (temperature OCR)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Pull photos and publish
        env:
          SPYPOINT_USERNAME: ${{ secrets.SPYPOINT_USERNAME }}
          SPYPOINT_PASSWORD: ${{ secrets.SPYPOINT_PASSWORD }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          set -e
          git config user.name "trailhub-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          published=0
          for attempt in 1 2 3 4 5; do
            echo "=== Attempt ${attempt}/5 ==="

            # Always start from the very latest remote state so our commit is a
            # clean fast-forward. This is what prevents data.js merge conflicts:
            # we never rebase or merge, we rebuild on top of current origin/main.
            git fetch origin main --quiet
            git reset --hard origin/main

            # Regenerate data.js / store.json / cameras.json / photos. pull.py only
            # downloads photos it hasn't seen (tracked in store.json), so re-running
            # is cheap and idempotent.
            python pull.py --limit 100

            git add -A
            if git diff --cached --quiet; then
              echo "No changes to publish this run."
              published=1
              break
            fi

            TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%MZ')
            git commit -m "Update trail-cam photos (${TIMESTAMP})"

            # Plain fast-forward push. No --force, no rebase: our commit sits
            # directly on top of the origin/main we just reset to.
            if git push origin HEAD:main; then
              echo "SUCCESS: Published update."
              published=1
              break
            fi

            echo "Remote moved while we were working; retrying from latest main..."
            sleep $((attempt * 3))
          done

          if [ "${published}" -ne 1 ]; then
            echo "ERROR: Could not publish after multiple attempts."
            exit 1
          fi
