name: Update TrailHub

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC; may run a few min late)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trailhub-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure local checkout is up-to-date with origin/main
        run: |
          git fetch origin main --quiet
          # Make sure we're on main and matching origin/main
          git checkout -B main origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull photos from SPYPOINT
        env:
          SPYPOINT_USERNAME: ${{ secrets.SPYPOINT_USERNAME }}
          SPYPOINT_PASSWORD: ${{ secrets.SPYPOINT_PASSWORD }}
        run: python pull.py --limit 100

      - name: Commit and push any new photos
        run: |
          set -e
          git config user.name "trailhub-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js store.json photos 2>&1 || true
          echo "Git status:"
          git status
          echo "Staged files:"
          git diff --cached --name-only
          if git diff --cached --quiet; then
            echo "No new photos this run."
            exit 0
          fi
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%MZ')
          echo "Creating commit with timestamp: $TIMESTAMP"
          git commit -m "Update trail-cam photos ($TIMESTAMP)" || { echo "ERROR: Commit failed"; git status; exit 1; }
          echo "Commit created. Current HEAD:"
          git log --oneline -1

          # Single safe push. --force-with-lease avoids blind overwrites.
          if git push origin main --force-with-lease; then
            echo "SUCCESS: Push completed."
            exit 0
          else
            echo "ERROR: Push failed. The remote changed since we fetched."
            exit 1
          fi