name: Update TrailHub

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC; may run a few min late)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trailhub-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull photos from SPYPOINT
        env:
          SPYPOINT_USERNAME: ${{ secrets.SPYPOINT_USERNAME }}
          SPYPOINT_PASSWORD: ${{ secrets.SPYPOINT_PASSWORD }}
        run: python pull.py --limit 100

      - name: Commit and push any new photos
        run: |
          set -e
          git config user.name "trailhub-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js store.json photos 2>&1 || true
          echo "Git status:"
          git status
          echo "Staged files:"
          git diff --cached --name-only
          if git diff --cached --quiet; then
            echo "No new photos this run."
            exit 0
          fi
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%MZ')
          echo "Creating commit with timestamp: $TIMESTAMP"
          git commit -m "Update trail-cam photos ($TIMESTAMP)" || { echo "ERROR: Commit failed"; git status; exit 1; }
          UPDATE_COMMIT=$(git rev-parse HEAD)
          echo "Commit created. Current HEAD:"
          git log --oneline -1
          echo "Generated update commit: $UPDATE_COMMIT"
          for attempt in 1 2 3; do
            echo "=== Push attempt ${attempt}/3 ==="
            echo "Fetching latest origin/main..."
            if ! git fetch origin main 2>&1; then
              echo "ERROR: Fetch failed"
              [ "${attempt}" -lt 3 ] && sleep $((attempt * 5)) && continue || exit 1
            fi
            echo "Resetting to origin/main to ensure clean state..."
            git reset --hard origin/main
            echo "Cherry-picking our commit..."
            if ! git cherry-pick "$UPDATE_COMMIT" 2>&1; then
              echo "ERROR: Cherry-pick failed"
              git cherry-pick --abort 2>/dev/null || true
              git reset --hard origin/main
              [ "${attempt}" -lt 3 ] && sleep $((attempt * 5)) && continue || exit 1
            fi
            echo "Pushing to origin/main..."
            if git push origin HEAD:main 2>&1; then
              echo "SUCCESS: Push completed."
              exit 0
            else
              echo "ERROR: Push failed on attempt ${attempt}"
              git reset --hard origin/main
              [ "${attempt}" -lt 3 ] && sleep $((attempt * 5)) && continue || exit 1
            fi
          done
          echo "ERROR: Failed after 3 attempts"
          exit 1