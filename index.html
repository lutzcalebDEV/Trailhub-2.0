<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Vale Trails — a clean, intuitive dashboard for your SPYPOINT trail cameras: gallery, movement insights, map and species review." />
  <meta name="theme-color" content="#0a0d0c" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#eef2ee" media="(prefers-color-scheme: light)" />
  <title>Vale Trails</title>

  <!-- Set theme before paint to avoid a flash of the wrong palette. -->
  <script>
    try {
      var t = localStorage.getItem("trailhub-theme") || "dark";
      document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
    } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Design system -->
  <link rel="stylesheet" href="app/styles.css" />

  <!-- Leaflet (map tiles require the network regardless) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>
<body>
  <div id="root">
    <div class="boot">
      <div class="boot__inner">
        <div class="boot__mark">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m2.5 19 5.5-9 3 4.5L18 7l3.5 12Z" />
          </svg>
        </div>
        <div class="muted">Loading Vale Trails…</div>
      </div>
    </div>
  </div>

  <!-- Site config + generated capture data (define globals before the app boots). -->
  <script src="config.js"></script>
  <script src="data.js"></script>

  <!-- Vendored React + htm (no build step; works on GitHub Pages over plain http). -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/htm.umd.js"></script>

  <!-- Leaflet runtime -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Application (ES modules) -->
  <script type="module" src="app/main.js"></script>
</body>
</html>
